# Mounts the CFK Connect JAAS config from AWS Secrets Manager into the pod
# and syncs it to a Kubernetes Secret so CFK can reference it via secretRef.
# The JAAS string was written to Secrets Manager by infra/platform Terraform.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: confluent-connect-credentials
  namespace: confluent
spec:
  provider: aws
  parameters:
    region: ap-southeast-2
    objects: |
      - objectName: "cfk-connect-jaas"
        objectType: "secretsmanager"
        objectAlias: "plain-jaas.conf"
        # Path pattern: /<environment_name>/confluent/cfk-connect-jaas
        # Full ARN or name — update objectName to match your environment prefix
  secretObjects:
    - secretName: connect-kafka-jaas
      type: Opaque
      data:
        - objectName: "plain-jaas.conf"
          key: plain.txt
