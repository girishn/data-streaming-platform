# IRSA annotation wires this ServiceAccount to the IAM role that allows
# reading Confluent API key secrets from AWS Secrets Manager.
# The role ARN comes from infra/eks Terraform output: cfk_connect_irsa_role_arn
apiVersion: v1
kind: ServiceAccount
metadata:
  name: connect
  namespace: confluent
  annotations:
    eks.amazonaws.com/role-arn: "" # replace with cfk_connect_irsa_role_arn output
