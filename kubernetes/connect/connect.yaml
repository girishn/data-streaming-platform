# CFK Connect CR — two-replica Connect worker pool connecting to Confluent Cloud.
#
# Auth model (from KB: 09-Security-Architecture/mtls-oauth.md):
#   - Internal (within EKS):  mTLS via cert-manager / cfk-ca-issuer
#   - External (→ CC broker): SASL/PLAIN over TLS — API key from Secrets Manager
#   - External (→ CC SR):     Basic auth over HTTPS — same API key pair
#
# Secrets Manager path for JAAS config: /<env>/confluent/cfk-connect-jaas
# Replace bootstrap and SR endpoints with infra/platform Terraform outputs.
#
# CSI volume is NOT mounted here — CFK's podTemplate doesn't accept raw Kubernetes
# volumes/volumeMounts. Secret sync is handled by secret-sync.yaml (a dedicated
# pod that mounts the CSI volume to trigger SecretProviderClass → K8s Secret creation).
apiVersion: platform.confluent.io/v1beta1
kind: Connect
metadata:
  name: connect
  namespace: confluent
spec:
  replicas: 2

  image:
    application: confluentinc/cp-server-connect:7.6.1
    init: confluentinc/confluent-init-container:2.8.1

  podTemplate:
    serviceAccountName: connect  # IRSA-annotated SA in service-account.yaml
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 2000m
        memory: 2Gi

  configOverrides:
    server:
      - "exactly.once.source.enabled=true"

  # Internal mTLS — CFK generates certs using its own CA
  tls:
    autoGeneratedCerts: true

  # Outbound connection to Confluent Cloud Kafka (SASL/PLAIN over TLS)
  dependencies:
    kafka:
      bootstrapEndpoint: "" # replace with cluster_bootstrap_endpoint from infra/platform output
      authentication:
        type: plain
        jaasConfigPassThrough:
          secretRef: connect-kafka-jaas  # K8s Secret synced by secret-sync.yaml via CSI
      tls:
        enabled: true
        ignoreTrustStoreConfig: true  # use JVM default trust store for Confluent Cloud certs

    # BEGIN:schemaRegistry  (stripped by provision.py when SR endpoint not yet available)
    schemaRegistry:
      url: "" # replace with schema_registry_endpoint from infra/platform output
      authentication:
        type: basic
        basic:
          secretRef: connect-kafka-jaas  # same API key pair works for SR basic auth
      tls:
        enabled: true
        ignoreTrustStoreConfig: true
    # END:schemaRegistry
