# Dedicated pod that mounts the CSI volume to trigger SecretProviderClass sync.
# The Secrets Store CSI driver only creates the K8s Secret (connect-kafka-jaas)
# when a pod mounts the volume — CFK's Connect CR cannot do this itself because
# CFK's podTemplate does not expose raw Kubernetes volumes/volumeMounts fields.
# This pod stays running to keep the secret refreshed on rotation.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: confluent-secret-sync
  namespace: confluent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: confluent-secret-sync
  template:
    metadata:
      labels:
        app: confluent-secret-sync
    spec:
      serviceAccountName: connect  # reuses IRSA SA — has secretsmanager:GetSecretValue
      containers:
        - name: sync
          image: busybox:stable
          command: ["sh", "-c", "while true; do sleep 3600; done"]
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
          volumeMounts:
            - name: confluent-credentials
              mountPath: /mnt/secrets-store
              readOnly: true
      volumes:
        - name: confluent-credentials
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: confluent-connect-credentials
